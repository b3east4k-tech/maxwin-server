<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaxWin Casino</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">MAXWIN</div>
  <div class="header-right">
    <div id="userInfo">Guest</div>
    <button class="btn" id="loginTab">Login</button>
    <button class="btn" id="registerTab">Register</button>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <ul>
      <li class="active">?? Slots</li>
      <li>?? Turbo Mines</li>
      <li>?? Roulette</li>
      <li>?? Blackjack</li>
      <li>?? VIP</li>
    </ul>
  </aside>

  <main class="main">
    <div class="banner">
      <h1>WELCOME TO MAXWIN</h1>
      <p>Play. Win. Repeat.</p>
    </div>

    <div id="gameArea">
      <h2>Turbo Mines</h2>
      <button id="startGame">Start Game</button>
      <div id="minesField"></div>
      <div id="winInfo"></div>
    </div>

  </main>

</div>

<!-- ﾌ郝琿拖 -->
<div class="modal hidden" id="authModal">
  <div class="modal-content">
    <span class="close" id="modalClose">&times;</span>
    <h2 id="modalTitle">Login</h2>
    <div id="errorBox" class="hidden"></div>
    <form id="authForm">
      <input type="text" placeholder="Username" id="username" required>
      <input type="password" placeholder="Password" id="password" required>
      <div class="register-only hidden">
        <input type="password" placeholder="Confirm Password" id="confirmPassword">
        <input type="email" placeholder="Email" id="email">
        <select id="currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
        </select>
        <select id="language">
          <option value="en">English</option>
          <option value="ru">ﾐ梫垬韜</option>
        </select>
      </div>
      <button type="submit" id="submitBtn">Login</button>
    </form>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
